name: Déploiement sur GitHub Pages
on:
     push:
          branches:
               - main
permissions:
     contents: write
jobs:
     deploy:
          runs-on: ubuntu-latest
          steps:
               - name: Récupérer le code source
                 uses: actions/checkout@v4
                 with:
                      # Disable submodule fetching to avoid errors when .gitmodules is missing/invalid
                      submodules: false

               - name: Déployer sur GitHub Pages
                 uses: peaceiris/actions-gh-pages@v3
                 with:
                      github_token: ${{ secrets.GITHUB_TOKEN }}
                      # publish_dir must be relative to the runner workspace; use ./ for repo root
                      publish_dir: ./
